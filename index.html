<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AnimePomodoro</title>
    <!-- TODO: GitHub Actions publish step must replace this with <base href="/AnimePomodoro/" /> -->
    <base href="/AnimePomodoro/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="height:100vh;display:flex;align-items:center;justify-content:center;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="48" height="48">
                <circle cx="50" cy="50" fill="none" stroke="#e8a0bf" stroke-width="8" r="38"
                    stroke-dasharray="150 60">
                    <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
                        dur="1s" values="0 50 50;360 50 50" keyTimes="0;1" />
                </circle>
            </svg>
        </div>
    </div>

    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
        (function (l) {
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function (v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (q.q ? ('?' + q.q) : '') +
                        l.hash
                    );
                }
            }
        }(window.location));
    </script>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2715;</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/site.js"></script>
    <script src="js/lofi.js"></script>
</body>

</html>
